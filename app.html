<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <!-- [Keep all existing head content, CSS as before] -->
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moodwave — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <!-- [Keep all existing CSS exactly as before] -->
  <style>
    /* Add history panel styles */
    #history-panel { display:none; background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:1.5rem; margin-bottom:2rem; }
    .history-item { padding:1rem; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.2s; }
    .history-item:hover { background:var(--bg3); }
    .history-date { font-size:0.75rem; color:var(--text2); margin-bottom:0.25rem; }
    .history-name { font-weight:500; }
    .bulk-actions { display:flex; gap:1rem; margin-top:1rem; flex-wrap:wrap; }
  </style>
</head>
<body>
  <!-- [Keep existing nav, canvas, etc. as before] -->
  <div class="content">
    <nav>
      <div class="nav-logo">Mood<span>wave</span></div>
      <div class="nav-right">
        <div class="theme-toggle">
          <button class="toggle-btn" id="darkBtn" onclick="setTheme('dark')">🌙</button>
          <button class="toggle-btn" id="lightBtn" onclick="setTheme('light')">☀️</button>
        </div>
        <button onclick="toggleHistory()" class="btn-ghost" style="padding:0.65rem 1.4rem;font-size:0.72rem;">History</button>
        <button onclick="logout()" class="btn-ghost" style="padding:0.65rem 1.4rem;font-size:0.72rem;">Logout</button>
      </div>
    </nav>

    <section>
      <!-- [Keep loading, dashboard, welcome as before] -->
      <div id="dashboard" style="display:none;">
        <!-- [Keep welcome, actions as before] -->
        <div id="history-panel">
          <div class="section-eyebrow">Build History</div>
          <div id="history-list"></div>
          <div style="text-align:center;padding:1rem;color:var(--text2);font-size:0.875rem;" id="no-history">No previous builds yet</div>
        </div>
        <!-- [Keep progress, results, empty as before] -->
      </div>
    </section>
  </div>

  <script>
    let authToken = localStorage.getItem('mw-token');
    const urlParams = new URLSearchParams(window.location.search);
    const urlToken = urlParams.get('token');
    if (urlToken) {
      authToken = urlToken;
      localStorage.setItem('mw-token', authToken);
      window.history.replaceState({}, document.title, window.location.pathname);
    }
    let playlistsData = null;
    let cachedTracks = [];
    const API = 'https://moodwave-sibw.onrender.com';

    // ─── HISTORY MANAGEMENT ───
    function loadHistory() {
      const history = JSON.parse(localStorage.getItem('mw-history') || '[]');
      const historyList = document.getElementById('history-list');
      const noHistory = document.getElementById('no-history');
      
      if (!history.length) { noHistory.style.display = 'block'; return; }
      noHistory.style.display = 'none';
      
      historyList.innerHTML = history.map((build, idx) => `
        <div class="history-item" onclick="loadHistoryBuild(${idx})">
          <div class="history-date">${new Date(build.timestamp).toLocaleString()}</div>
          <div class="history-name">${build.playlistCount} Playlists · ${build.totalTracks} Tracks</div>
        </div>
      `).join('');
    }

    function loadHistoryBuild(idx) {
      const history = JSON.parse(localStorage.getItem('mw-history') || '[]');
      if (!history[idx]) return;
      const build = history[idx];
      playlistsData = build.playlists;
      renderPlaylists(build.playlists);
      document.getElementById('results').style.display = 'block';
      document.getElementById('stats').innerHTML = `
        <div><div class="stat-num">${build.playlistCount}</div><div class="stat-label">Playlists Generated</div></div>
        <div><div class="stat-num">${build.totalTracks}</div><div class="stat-label">Tracks Analysed</div></div>
        <div><div class="stat-num">${history.length}</div><div class="stat-label">Total Builds</div></div>
      `;
      showToast(`Loaded build from ${new Date(build.timestamp).toLocaleDateString()}`);
    }

    function toggleHistory() {
      const panel = document.getElementById('history-panel');
      panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
      if (panel.style.display === 'block') loadHistory();
    }

    // ─── BUILD PLAYLISTS (NOW POST, ACCEPTS CACHED TRACKS) ───
    async function buildPlaylists() {
      const btn = document.getElementById('build-btn');
      const progress = document.getElementById('progress');
      const results = document.getElementById('results');
      const empty = document.getElementById('empty');

      btn.disabled = true; btn.textContent = 'Building...';
      progress.style.display = 'block';
      results.style.display = 'none';
      empty.style.display = 'none';

      try {
        // Load cached tracks from localStorage
        cachedTracks = JSON.parse(localStorage.getItem('mw-cached-tracks') || '[]');
        
        const res = await fetch(`${API}/playlist/build`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
          body: JSON.stringify({ cachedTracks })
        });
        const data = await res.json();

        progress.style.display = 'none';
        btn.disabled = false; btn.textContent = '⚡ Build My Playlists';

        if (data.success) {
          playlistsData = data.playlists;
          // Save to history
          const history = JSON.parse(localStorage.getItem('mw-history') || '[]');
          history.unshift({
            timestamp: Date.now(),
            playlistCount: data.playlistCount,
            totalTracks: data.totalTracksAnalysed,
            playlists: data.playlists
          });
          localStorage.setItem('mw-history', JSON.stringify(history.slice(0, 10))); // Keep last 10 builds
          
          // Cache tracks for next build (up to 400)
          localStorage.setItem('mw-cached-tracks', JSON.stringify(data.cachedTracks || []));
          
          document.getElementById('stats').innerHTML = `
            <div><div class="stat-num">${data.playlistCount}</div><div class="stat-label">Playlists Generated</div></div>
            <div><div class="stat-num">${data.totalTracksAnalysed}</div><div class="stat-label">Tracks Analysed</div></div>
            <div><div class="stat-num">${history.length}</div><div class="stat-label">Total Builds</div></div>
          `;
          renderPlaylists(data.playlists);
          results.style.display = 'block';
          document.getElementById('push-btn').style.display = 'inline-block';
          showToast(`${data.playlistCount} playlists ready! (${data.totalTracksAnalysed} tracks)`);
        } else {
          empty.style.display = 'block';
          showToast(data.error || 'Failed to build playlists', 4000);
        }
      } catch (err) {
        console.error('[BUILD ERROR]', err.message);
        progress.style.display = 'none';
        btn.disabled = false; btn.textContent = '⚡ Build My Playlists';
        showToast('Error building playlists', 4000);
      }
    }

    // ─── RENDER PLAYLISTS (ADDED BULK COPY LINKS) ───
    function renderPlaylists(playlists) {
      const container = document.getElementById('playlists-container');
      container.innerHTML = '';
      playlists.forEach(playlist => {
        const card = document.createElement('div');
        card.className = 'playlist-card reveal visible';
        card.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
            <div>
              <h3 class="syne" style="font-size:1.25rem;font-weight:600;margin-bottom:0.25rem;">${playlist.name}</h3>
              <div style="color:var(--text2);font-size:0.875rem;">${playlist.trackCount} tracks · ${playlist.mood}</div>
            </div>
            <div class="mood-chip lit">${playlist.mood}</div>
          </div>
          <div class="bulk-actions">
            <button onclick="copyAllLinks('${playlist.name}')" class="btn-ghost" style="padding:0.5rem 1rem;font-size:0.75rem;">Copy All Spotify Links</button>
            <button onclick="copyAllURIs('${playlist.name}')" class="btn-ghost" style="padding:0.5rem 1rem;font-size:0.75rem;">Copy All URIs</button>
            <a href="https://www.spotify.com/us/how-to-create-playlists/" target="_blank" class="btn-ghost" style="padding:0.5rem 1rem;font-size:0.75rem;">How to Import</a>
          </div>
          <div style="margin-top:1rem;">
            ${playlist.tracks.slice(0,6).map(t => `
              <div class="track-row">
                <img src="${t.image || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22/>'}" alt="${t.name}">
                <div style="flex:1;">
                  <div class="track-name">
                    <a href="${t.uri.replace('spotify:track:', 'https://open.spotify.com/track/')}" target="_blank" style="color:var(--text);text-decoration:none;">${t.name}</a>
                  </div>
                  <div class="track-artist">${t.artist}</div>
                </div>
                <a href="${t.uri.replace('spotify:track:', 'https://open.spotify.com/track/')}" target="_blank" style="color:var(--accent2);font-size:0.8rem;">Open</a>
              </div>
            `).join('')}
            ${playlist.tracks.length > 6 ? `<div style="color:var(--text3);font-size:0.875rem;text-align:center;padding:0.75rem;">+ ${playlist.tracks.length - 6} more tracks</div>` : ''}
          </div>
        `;
        container.appendChild(card);
      });
    }

    // ─── BULK COPY FUNCTIONS (NO POPUPS) ───
    function copyAllLinks(playlistName) {
      const playlist = playlistsData?.find(p => p.name === playlistName);
      if (!playlist) return;
      const links = playlist.tracks.map(t => t.uri.replace('spotify:track:', 'https://open.spotify.com/track/')).join('\n');
      navigator.clipboard.writeText(links).then(() => {
        showToast(`Copied ${playlist.tracks.length} Spotify links for "${playlistName}"`);
      }).catch(() => showToast('Failed to copy links'));
    }

    function copyAllURIs(playlistName) {
      const playlist = playlistsData?.find(p => p.name === playlistName);
      if (!playlist) return;
      const uris = playlist.tracks.map(t => t.uri).join('\n');
      navigator.clipboard.writeText(uris).then(() => {
        showToast(`Copied ${playlist.tracks.length} Spotify URIs for "${playlistName}"`);
      }).catch(() => showToast('Failed to copy URIs'));
    }

    // ─── PUSH PLAYLISTS (HANDLE 403) ───
    async function pushPlaylists() {
      if (!playlistsData) return;
      const btn = document.getElementById('push-btn');
      btn.disabled = true; btn.textContent = 'Pushing...';
      try {
        const res = await fetch(`${API}/playlist/push`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
          body: JSON.stringify({ playlists: playlistsData })
        });
        const data = await res.json();
        btn.disabled = false; btn.textContent = '🚀 Push to Spotify';

        if (res.ok && data.success) {
          showToast(`✅ ${data.playlists.length} playlists pushed!`);
          data.playlists.forEach(p => setTimeout(() => window.open(p.url, '_blank'), 500));
        } else {
          if (res.status === 403) {
            showToast('Permission denied. Redirecting to re-authorize...', 4000);
            setTimeout(() => window.location.href = `${API}/auth/spotify`, 2000);
          } else {
            showToast(data.error || 'Failed to push playlists', 4000);
          }
        }
      } catch (err) {
        btn.disabled = false; btn.textContent = '🚀 Push to Spotify';
        showToast('Error pushing playlists', 4000);
      }
    }

    // ─── AUTH CHECK (UPDATED) ───
    async function checkAuth() {
      if (!authToken) { window.location.href = '/'; return; }
      try {
        const res = await fetch(`${API}/auth/me`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (!res.ok) throw new Error(`Auth check failed: ${res.status}`);
        const data = await res.json();
        if (!data.spotify && !data.lastfm) { 
          localStorage.removeItem('mw-token');
          window.location.href = '/'; 
          return; 
        }
        loadDashboard(data);
      } catch (err) {
        console.error('[AUTH CHECK FAILED]', err.message);
        localStorage.removeItem('mw-token');
        window.location.href = '/'; 
      }
    }

    // ─── [Keep existing loadDashboard, theme, canvas, toast, logout, scroll reveal as before] ───
    function loadDashboard(data) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      if (data.spotify) {
        document.getElementById('user-name').textContent = data.spotify.name || data.spotify.id;
        if (data.spotify.image) {
          const img = document.getElementById('user-img');
          img.src = data.spotify.image; img.style.display = 'block';
        }
      }
    }

    // [Keep theme, canvas, toast, logout, scroll reveal functions exactly as before]
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('darkBtn').classList.toggle('active', theme === 'dark');
      document.getElementById('lightBtn').classList.toggle('active', theme === 'light');
      localStorage.setItem('mw-theme', theme);
    }
    const saved = localStorage.getItem('mw-theme') || 'dark';
    setTheme(saved);

    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    let particles = [];
    function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
    resizeBg();
    window.addEventListener('resize', resizeBg);
    for (let i = 0; i < 60; i++) {
      particles.push({
        x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
        r: Math.random() * 2 + 0.5, dx: (Math.random() - 0.5) * 0.3, dy: (Math.random() - 0.5) * 0.3,
        o: Math.random() * 0.4 + 0.1
      });
    }
    function animateBg() {
      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const col = isDark ? '193,39,45' : '123,29,46';
      particles.forEach(p => {
        p.x += p.dx; p.y += p.dy;
        if (p.x < 0 || p.x > bgCanvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > bgCanvas.height) p.dy *= -1;
        bgCtx.beginPath(); bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(${col},${p.o})`; bgCtx.fill();
      });
      particles.forEach((a, i) => {
        particles.slice(i + 1).forEach(b => {
          const dist = Math.hypot(a.x - b.x, a.y - b.y);
          if (dist < 120) {
            bgCtx.beginPath(); bgCtx.moveTo(a.x, a.y); bgCtx.lineTo(b.x, b.y);
            bgCtx.strokeStyle = `rgba(${col},${0.08 * (1 - dist / 120)})`;
            bgCtx.lineWidth = 0.5; bgCtx.stroke();
          }
        });
      });
      requestAnimationFrame(animateBg);
    }
    animateBg();

    function showToast(msg, duration = 3000) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), duration);
    }

    async function logout() {
      try {
        await fetch(`${API}/auth/logout`, { 
          method: 'POST',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
      } catch (err) {
        console.error('[LOGOUT ERROR]', err.message);
      }
      localStorage.removeItem('mw-token');
      localStorage.removeItem('mw-cached-tracks');
      window.location.href = '/';
    }

    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12 });
    reveals.forEach(r => observer.observe(r));

    checkAuth();
  </script>
</body>
</html>
